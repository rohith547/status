name: Response Time CI
on:
  schedule:
    - cron: "0 23 * * 0"
  repository_dispatch:
    types: [upptime]

jobs:
  response_time:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@master
        with:
          command: response-time
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
